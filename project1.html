





<!DOCTYPE html>
<html>
<head>
    <title>Cyber Event Registration</title>

    <style>
        body {
            background-color: #0b1f2a;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            background: #132f3d;
            border-radius: 10px;
            box-shadow: 0 0 10px #00ffcc;
        }

        h1 {
            text-align: center;
            color: #00ffcc;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: none;
        }

        fieldset {
            margin-top: 15px;
            border: 1px solid #00ffcc;
            padding: 10px;
        }

        legend {
            color: #00ffcc;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #00ffcc;
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            margin-top: 15px;
            cursor: pointer;
        }

        .btn:hover {
            background: #00ccaa;
        }
    </style>
</head>

<body>

<div class="container">

<h1>Cyber Event Registration</h1>

<form>

    <label>Name:</label>
    <input type="text" required>

    <label>Email:</label>
    <input type="email" required>

    <label>Phone No:</label>
    <input type="tel" value="+91" required>

    <label>Occupation:</label>
    <select required>
        <option>Student</option>
        <option>Professional</option>
        <option>Researcher</option>
        <option>Other</option>
    </select>

    <!-- Cyber Skills -->
    <fieldset>
        <legend>Cyber Skills</legend>

        <input type="checkbox"> Networking<br>
        <input type="checkbox"> Ethical Hacking<br>
        <input type="checkbox"> Cyber Security Basics<br>
        <input type="checkbox"> Python Programming<br>
        <input type="checkbox"> Linux<br>
        <input type="checkbox"> Web Security<br>
    </fieldset>

    <!-- Tools -->
    <fieldset>
        <legend>Tools Known</legend>

        <input type="checkbox"> Wireshark<br>
        <input type="checkbox"> Metasploit<br>
        <input type="checkbox"> Nmap<br>
        <input type="checkbox"> Burp Suite<br>
    </fieldset>

    <!-- Experience -->
    <label>Experience Level:</label>
    <select>
        <option>Beginner</option>
        <option>Intermediate</option>
        <option>Advanced</option>
    </select>

    <label>Comments:</label>
    <textarea rows="5" placeholder="Enter your message..."></textarea>

    <button class="btn">Register</button>

</form>

</div>

</body>
</html>
