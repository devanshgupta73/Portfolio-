



<!DOCTYPE html>
<html>
    <head>
        <title>Page Title</title>
    </head>
    <body style="background-color:green;">
        <h1>Cyber Event Registration</h1>
        <hr>
        <form>
        <label for="name">Name:</label>
        <br />
        <br />
        <input type="text" id="name">
        <br />
        <label for="email">Email:</label>
        <br />
        <br />
        <input type="email" id="email">
        <br />
        <label for="ph">Phone No:</label>
        <br />
        <br />
        <input type="tel" id="ph" value="+91 ">
        <br />
        <br />
         <p>Occupation:</p>
        <select>
            <option name="st">Student</option>
            <option name="pr">Profession</option>
            <option name="other">Others</option>
        </select>
        <hr>
        <fieldset>
            <legend>Topic of interest:</legend>
            <input type="checkbox" id="html">
            <label for="html">HTML</label>
            <input type="checkbox" id="css">
            <label for="css">CSS</label>
            <input type="checkbox" id="JS">
            <label for="JS">JAVA SCRIPT</label>
             
        </fieldset>
            
        <p>Comments:</p>
        <textarea name="text" id="text" cols="30" rows="10"placeholder="click to here for comment"></textarea>
        <button name="register"><b>Register</b></button>
        </form>
    </body>
</html>
