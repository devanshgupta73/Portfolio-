

<!DOCTYPE html>
<html>
    <head>
        <title>Page Title</title>
    </head>
    <body style="background: linear-gradient(to right, #000000, #434343); color: white;">
        <h1>Job Application</h1>
        <hr>
        <form>
        <label for="name">Name:</label>
        <br />
        <br />
        <input type="text" id="name">
        <br />
        <label for="email">Email:</label>
        <br />
        <br />
        <input type="email" id="email">
        <br />
        <label for="ph">Phone:</label>
        <br />
        <br />
        <input type="tel" id="ph" value="+91 ">
        <br />
        <label for="resume">Resume</label>
        <br />
        <br />
        <input type="file" id="resume">
        <br />
        <label for="ex">Experience(years):</label>
        <br />
        <br />
        <input type="number" id="ex">
        <br />
        <br />
        <hr>
        <fieldset>
            <legend>Skills:</legend>
            <input type="checkbox" id="html">
            <label for="html">HTML</label>
            <input type="checkbox" id="css">
            <label for="css">CSS</label>
            <input type="checkbox" id="JS">
            <label for="JS">JAVA SCRIPT</label>
             
        </fieldset>
        <p>Highest Education:</p>
        <select>
            <option name="ps">Primary School</option>
            <option name="hs">High School</option>
            <option name="grad">Graduation</option>
            <option name="pg">Postgraduation</option>
            <option name="phd">PHD</option>
        </select>
        <p>Availability:</p>
        <input type="radio" id="ft" name="jobtype">
        <label for="ft">Full-Time</label>
        <input type="radio" id="pt" name="jobtype">
        <label for="pt">Part-Time</label>
        
        <p>Additional Comment:</p>
        <textarea name="text" id="text" cols="30" rows="20"placeholder="click to here for comment"></textarea>
        </form>
    </body>
</html>
